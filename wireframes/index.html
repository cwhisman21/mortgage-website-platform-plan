<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mortgage Website Routed Wireframes</title>
    <style>
      :root {
        --ink: #24323b;
        --muted: #667781;
        --line: #31424d;
        --paper: #fffdf8;
        --page: #ede8de;
        --header: #d7e8f7;
        --context: #f2dfcf;
        --white-space-bg: #fffaf0;
        --white-space-line: rgba(49, 66, 77, 0.22);
        --c0: #cdebd6;
        --c1: #f3d6e2;
        --c2: #d8d0f2;
        --c3: #f8e3a4;
        --c4: #bfe8e0;
        --c5: #f5c7ad;
        --c6: #c9def8;
        --c7: #e5d3a5;
        --c8: #cfe1c3;
        --c9: #e9cbd2;
        --c10: #d1e3dc;
        --c11: #f1d7b6;
        --footer: #d9d6cf;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--page);
        color: var(--ink);
        font-family: Georgia, "Times New Roman", serif;
      }

      a {
        color: inherit;
      }

      .app-shell {
        width: min(1440px, 100vw);
        min-height: 100vh;
        margin: 0 auto;
        background: var(--paper);
        border-left: 2px solid var(--line);
        border-right: 2px solid var(--line);
      }

      .topbar {
        display: grid;
        grid-template-columns: 260px 1fr auto;
        align-items: center;
        gap: 18px;
        min-height: 88px;
        padding: 14px 28px;
        background: var(--header);
        border-bottom: 2px solid var(--line);
      }

      .brand {
        display: grid;
        gap: 2px;
        text-decoration: none;
      }

      .brand strong {
        font-size: 22px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .brand span {
        color: var(--muted);
        font-family: "Trebuchet MS", Verdana, sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }

      .nav a,
      .action-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 7px 12px;
        border: 2px solid var(--line);
        background: rgba(255, 255, 255, 0.54);
        font-family: "Trebuchet MS", Verdana, sans-serif;
        font-size: 13px;
        font-weight: 800;
        text-decoration: none;
      }

      .action-link {
        background: var(--c3);
      }

      .contextbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
        min-height: 54px;
        padding: 10px 28px;
        background: var(--context);
        border-bottom: 2px solid var(--line);
        font-family: "Trebuchet MS", Verdana, sans-serif;
        font-size: 13px;
        font-weight: 800;
      }

      .contextbar span:last-child {
        color: var(--muted);
        text-align: right;
      }

      .page-intro {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 330px;
        gap: 18px;
        padding: 22px 28px 0;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 300px;
        gap: 22px;
        padding: 0 28px 34px;
      }

      .stack,
      .rail {
        display: grid;
        gap: 18px;
        align-content: start;
      }

      .rail {
        position: sticky;
        top: 14px;
        align-self: start;
      }

      .wire-section {
        display: grid;
        gap: 12px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 10px 12px;
        border: 2px solid var(--line);
        background: #f7f1e7;
        font-family: "Trebuchet MS", Verdana, sans-serif;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .section-title span:last-child {
        color: var(--muted);
        letter-spacing: 0;
        text-transform: none;
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .grid.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid.four {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .block,
      .white-space {
        position: relative;
        display: flex;
        min-height: 126px;
        align-items: center;
        justify-content: center;
        padding: 18px;
        border: 2px solid var(--line);
        color: var(--ink);
        text-align: center;
        text-decoration: none;
      }

      .block {
        flex-direction: column;
        gap: 8px;
        transition:
          transform 140ms ease,
          box-shadow 140ms ease,
          filter 140ms ease;
      }

      a.block:hover,
      a.block:focus,
      .nav a:hover,
      .nav a:focus,
      .action-link:hover,
      .action-link:focus {
        outline: 4px solid rgba(49, 66, 77, 0.18);
        outline-offset: 2px;
        transform: translateY(-1px);
        box-shadow: 5px 5px 0 rgba(49, 66, 77, 0.18);
      }

      .block strong {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: min(94%, 660px);
        min-height: 42px;
        padding: 9px 14px;
        border: 1px solid rgba(49, 66, 77, 0.42);
        background: rgba(255, 255, 255, 0.7);
        font-size: clamp(17px, 1.5vw, 23px);
        line-height: 1.18;
        letter-spacing: 0;
      }

      .block small {
        max-width: 86%;
        color: rgba(36, 50, 59, 0.74);
        font-family: "Trebuchet MS", Verdana, sans-serif;
        font-size: 12px;
        font-weight: 800;
        line-height: 1.25;
      }

      .block .route-hint {
        position: absolute;
        right: 10px;
        bottom: 8px;
        max-width: 70%;
        color: rgba(36, 50, 59, 0.64);
        font-family: "Trebuchet MS", Verdana, sans-serif;
        font-size: 11px;
        font-weight: 800;
      }

      .hero {
        min-height: 310px;
      }

      .hero.tall {
        min-height: 380px;
      }

      .large {
        min-height: 270px;
      }

      .medium {
        min-height: 184px;
      }

      .small {
        min-height: 124px;
      }

      .rail-block {
        min-height: 210px;
      }

      .rail-block.primary {
        min-height: 360px;
      }

      .white-space {
        min-height: 70px;
        background:
          repeating-linear-gradient(
            135deg,
            var(--white-space-bg) 0,
            var(--white-space-bg) 12px,
            var(--white-space-line) 12px,
            var(--white-space-line) 14px
          );
        color: rgba(36, 50, 59, 0.74);
        font-family: "Trebuchet MS", Verdana, sans-serif;
        font-size: 18px;
        font-weight: 900;
      }

      .page-gap {
        margin: 18px 28px;
      }

      .c0 {
        background: var(--c0);
      }

      .c1 {
        background: var(--c1);
      }

      .c2 {
        background: var(--c2);
      }

      .c3 {
        background: var(--c3);
      }

      .c4 {
        background: var(--c4);
      }

      .c5 {
        background: var(--c5);
      }

      .c6 {
        background: var(--c6);
      }

      .c7 {
        background: var(--c7);
      }

      .c8 {
        background: var(--c8);
      }

      .c9 {
        background: var(--c9);
      }

      .c10 {
        background: var(--c10);
      }

      .c11 {
        background: var(--c11);
      }

      .footer {
        display: grid;
        grid-template-columns: 1.2fr repeat(5, 1fr);
        gap: 14px;
        min-height: 220px;
        padding: 24px 28px;
        border-top: 2px solid var(--line);
        background: var(--footer);
      }

      .footer .block {
        min-height: 130px;
      }

      .status {
        padding: 44px 28px;
      }

      .status .block {
        min-height: 260px;
      }

      @media (max-width: 1040px) {
        .topbar,
        .contextbar,
        .page-intro,
        .layout,
        .footer {
          grid-template-columns: 1fr;
        }

        .contextbar span:last-child {
          text-align: left;
        }

        .rail {
          position: static;
        }

        .grid.three,
        .grid.four {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 700px) {
        .app-shell {
          border: 0;
        }

        .topbar,
        .contextbar,
        .page-intro,
        .layout,
        .footer {
          padding-left: 16px;
          padding-right: 16px;
        }

        .page-gap {
          margin-left: 16px;
          margin-right: 16px;
        }

        .grid.two,
        .grid.three,
        .grid.four {
          grid-template-columns: 1fr;
        }

        .block strong {
          font-size: 17px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app" class="app-shell">
      <section class="status">
        <div class="block c0"><strong>Loading routed wireframes</strong></div>
      </section>
    </div>

    <script>
      const seedUrl = "../mock-data/prototype-seed.json";
      let data;
      let maps;
      let colorCursor = 0;

      const clean = (value) =>
        String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");

      const normalizeRoute = (route) => {
        const value = route || "/";
        return value.length > 1 && value.endsWith("/") ? value.slice(0, -1) : value;
      };

      const routeHref = (route) => `#${route || "/"}`;
      const asMap = (items) => Object.fromEntries((items || []).map((item) => [item.id, item]));
      const byIds = (ids, map) => (ids || []).map((id) => map[id]).filter(Boolean);
      const first = (items, count) => (items || []).slice(0, count);

      function block(title, options = {}) {
        const {
          hint = "",
          to = "",
          size = "medium",
          className = "",
          color,
          anchor = ""
        } = options;
        const classColor = color || `c${colorCursor++ % 12}`;
        const tag = to ? "a" : "div";
        const href = to ? ` href="${clean(routeHref(to))}"` : "";
        const id = anchor ? ` id="${clean(anchor)}"` : "";
        const route = to ? `<span class="route-hint">${clean(to)}</span>` : "";
        return `<${tag}${href}${id} class="block ${classColor} ${size} ${className}"><strong>${clean(title)}</strong>${hint ? `<small>${clean(hint)}</small>` : ""}${route}</${tag}>`;
      }

      function whiteSpace(label = "white space") {
        return `<div class="white-space"><span>${clean(label)}</span></div>`;
      }

      function section(title, note, content) {
        return `
          <section class="wire-section">
            <div class="section-title"><span>${clean(title)}</span><span>${clean(note || "")}</span></div>
            ${content}
          </section>
        `;
      }

      function grid(items, columns = 2) {
        const cls = columns === 4 ? "four" : columns === 3 ? "three" : columns === 2 ? "two" : "one";
        return `<div class="grid ${cls}">${items.join("")}</div>`;
      }

      function currentRoute() {
        const raw = decodeURI(window.location.hash.replace(/^#/, "")) || "/";
        const [path, anchor] = raw.split("#");
        return { path: normalizeRoute(path || "/"), anchor };
      }

      function buildMaps(seed) {
        const built = {
          states: asMap(seed.states),
          cities: asMap(seed.cities),
          branches: asMap(seed.branches),
          loanOfficers: asMap(seed.loanOfficers),
          products: asMap(seed.products),
          ratesPages: asMap(seed.ratesPages),
          blogPages: asMap(seed.blogPages),
          articles: asMap(seed.articles),
          calculators: asMap(seed.calculators),
          directories: asMap(seed.directoryPages),
          routeMap: new Map()
        };

        built.routeMap.set("/", { type: "home", item: seed.siteEntryPages[0] });
        [
          ["state", seed.states],
          ["city", seed.cities],
          ["branch", seed.branches],
          ["loanOfficer", seed.loanOfficers],
          ["product", seed.products],
          ["rates", seed.ratesPages],
          ["blog", seed.blogPages],
          ["article", seed.articles],
          ["calculator", seed.calculators],
          ["directory", seed.directoryPages]
        ].forEach(([type, list]) => {
          (list || []).forEach((item) => built.routeMap.set(normalizeRoute(item.route), { type, item }));
        });
        built.routeMap.set("/locations", {
          type: "locationOverview",
          item: seed.directoryPages.find((page) => page.route === "/locations")
        });
        return built;
      }

      function header() {
        return `
          <header class="topbar">
            <a class="brand" href="#/">
              <strong>Snap Mortgage</strong>
              <span>Routed wireframe prototype</span>
            </a>
            <nav class="nav" aria-label="Prototype navigation">
              <a href="#/locations">Locations</a>
              <a href="#/buy">Buy</a>
              <a href="#/refinance">Refinance</a>
              <a href="#/loan-options">Loan Options</a>
              <a href="#/rates">Rates</a>
              <a href="#/calculators/mortgage-payment">Calculators</a>
              <a href="#/learning-center">Learning</a>
              <a href="#/loan-officers">Loan Officers</a>
              <a href="#/branches">Branches</a>
            </nav>
            <a class="action-link" href="#/loan-officers">Get matched</a>
          </header>
        `;
      }

      function pageShell(meta, introBlocks, mainBlocks, railBlocks) {
        colorCursor = 0;
        return `
          ${header()}
          <div class="contextbar">
            <span>${clean(meta.crumbs)}</span>
            <span>${clean(meta.source || "Prototype data - designer review")}</span>
          </div>
          <section class="page-intro">
            ${introBlocks}
          </section>
          <div class="page-gap">${whiteSpace()}</div>
          <section class="layout">
            <main class="stack">${mainBlocks}</main>
            <aside class="rail" aria-label="Page CTA rail">${railBlocks}</aside>
          </section>
          ${footer()}
        `;
      }

      function footer() {
        return `
          <footer class="footer">
            ${block("Global Footer - Compliance and NMLS", { hint: "Equal Housing, licensing, privacy, accessibility", size: "small", color: "c10" })}
            ${block("Footer Locations", { to: "/locations", size: "small", color: "c6" })}
            ${block("Footer Products", { to: "/loan-options", size: "small", color: "c4" })}
            ${block("Footer Rates", { to: "/rates", size: "small", color: "c5" })}
            ${block("Footer Learning", { to: "/learning-center", size: "small", color: "c2" })}
            ${block("Footer Contact", { to: "/loan-officers", size: "small", color: "c1" })}
          </footer>
        `;
      }

      function rail(items) {
        return items
          .map((item, index) => {
            if (item === "white") return whiteSpace();
            return block(item.title, {
              hint: item.hint,
              to: item.to,
              size: `rail-block ${index === 0 ? "primary" : ""}`
            });
          })
          .join("");
      }

      function homePage() {
        const products = first(data.products, 6);
        const topics = data.blogPages.filter((page) => page.route !== "/learning-center").slice(0, 3);
        const intro = `
          ${block("Homepage Hero - Choose your mortgage path", {
            hint: "Lead-in only: rates, calculators, products, locations, learning, and experts live on deeper pages",
            to: "/locations",
            size: "hero tall"
          })}
          ${block("Start Here CTA - Get matched or compare rates", {
            hint: "Direct user to the next page instead of showing detailed data on home",
            to: "/rates",
            size: "hero"
          })}
        `;
        const main = [
          section(
            "Homepage Lead-In Card Grid",
            "Veterans United-style links into deeper pages",
            grid([
              block("Check today's mortgage rates", { to: "/rates", hint: "Compare rate types and get personalized options" }),
              block("Find your city or state", { to: "/locations", hint: "Location hub with state and city pages" }),
              block("Buy with a low down payment", { to: "/loan-options/fha-loans", hint: "FHA, VA, and first-time buyer paths" }),
              block("Mortgage payment calculator", { to: "/calculators/mortgage-payment", hint: "Estimate payment with taxes and insurance" }),
              block("First-time homebuyers", { to: "/learning-center/buying-a-home", hint: "Guides, checklists, and next steps" }),
              block("Start your mortgage", { to: "/loan-officers", hint: "Get matched with a loan officer" })
            ], 3)
          ),
          whiteSpace(),
          section(
            "Deep-Dive Hubs",
            "Home points out; deeper pages hold the details",
            grid([
              block("Location hub", { to: "/locations", hint: "State and city page library" }),
              block("Rates hub", { to: "/rates", hint: "Bankrate/NerdWallet-style rates page" }),
              block("Loan options hub", { to: "/loan-options", hint: "Product guides and comparisons" }),
              block("Learning center", { to: "/learning-center", hint: "Articles, topic hubs, and local updates" })
            ], 4)
          ),
          whiteSpace(),
          section(
            "Borrower Goal Paths",
            "Rocket product routing plus loanDepot buy/refi split",
            grid(products.map((product) => block(product.name, {
              to: product.route,
              hint: product.borrowerGoal || "Product guide"
            })), 3)
          ),
          section(
            "Learning Teasers",
            "Preview only; full content lives in article/topic pages",
            grid(topics.map((topic) => block(topic.name, {
              to: topic.route,
              hint: topic.purpose
            })), 2)
          ),
          whiteSpace(),
          section(
            "Trust and Compliance",
            "Visible from phase 1",
            grid([
              block("Source dates and data provenance", { hint: "Visible on deeper data pages" }),
              block("NMLS and licensing footer", { hint: "Compliance review placeholder" }),
              block("Editorial review signals", { hint: "Author, editor, reviewer model" })
            ], 3)
          )
        ].join("");
        const side = rail([
          { title: "Sticky CTA Rail - Start your path", hint: "Home remains a routing surface", to: "/loan-officers" },
          "white",
          { title: "Compare Rates", hint: "New dedicated rates page", to: "/rates" },
          { title: "Find a Local Expert", hint: "Loan officer directory", to: "/loan-officers" },
          "white",
          { title: "Learning Center Search", hint: "Editorial entry point", to: "/learning-center/search" }
        ]);
        return pageShell(
          { crumbs: "Home", source: "Revised: home is a lead-in hub, not a market data page" },
          intro,
          main,
          side
        );
      }

      function locationOverviewPage() {
        const states = first(data.states, 4);
        const cities = first(data.cities, 12);
        const branches = first(data.branches, 4);
        const articles = data.articles.filter((article) => article.type === "local_market_update").slice(0, 4);
        const intro = `
          ${block("Location Overview Hero - Explore mortgage markets", {
            hint: "Overall location page: state and city market data starts here, not on home",
            to: states[0]?.route || "/locations",
            size: "hero tall"
          })}
          ${block("Location Finder and Market Search", {
            hint: "Search by state, city, branch coverage, or borrower goal",
            to: "/learning-center/local-market-updates",
            size: "hero"
          })}
        `;
        const main = [
          section(
            "State Market Entry Cards",
            "Market-specific data moved off home",
            grid(states.map((state) => block(`${state.name} mortgage market`, {
              to: state.route,
              hint: `${state.marketSnapshot.medianHomePrice} median - ${state.marketSnapshot.inventory} inventory`
            })), 4)
          ),
          section(
            "City Dashboard Links",
            "Redfin-style city depth starts one click deeper",
            grid(cities.map((city) => block(`${city.name} city dashboard`, {
              to: city.route,
              hint: `${city.marketSnapshot.paymentScenario} - ${city.marketSnapshot.daysOnMarket} DOM`
            })), 3)
          ),
          whiteSpace(),
          section(
            "Location Comparison Tools",
            "Decision support before choosing a market",
            grid([
              block("Compare cities table", { hint: "Median price, payment, inventory, taxes" }),
              block("Property tax and insurance overview", { hint: "State-level affordability factors" }),
              block("Use city defaults in calculator", { to: "/calculators/mortgage-payment", hint: "Tool handoff" })
            ], 3)
          ),
          section(
            "Branch and Loan Officer Coverage",
            "Placement modules attached to locations",
            grid(branches.map((branch) => block(branch.name, {
              to: branch.route,
              hint: branch.coverageNote
            })).concat([block("Loan officer directory", { to: "/loan-officers", hint: "Filter by state, city, product, language" })]), 3)
          ),
          whiteSpace(),
          section(
            "Local Market Updates",
            "Editorial feed for location context",
            grid(articles.map((article) => block(article.title, {
              to: article.route,
              hint: article.reviewStatus
            })), 2)
          ),
          section(
            "Location FAQ and Data Sources",
            "Source dates and compliance",
            grid([
              block("Location FAQ", { hint: "How to compare cities and states" }),
              block("Market data methodology", { hint: "Sources, date ranges, update cadence" }),
              block("State licensing disclosure", { hint: "NMLS and state caveats" })
            ], 3)
          )
        ].join("");
        const side = rail([
          { title: "Sticky CTA - Find your market", hint: "Location overview action", to: states[0]?.route || "/locations" },
          "white",
          { title: "Compare City Payments", hint: "Use location data", to: "/calculators/mortgage-payment" },
          { title: "Talk to a Local Expert", hint: "Location-aware placement", to: "/loan-officers" },
          "white",
          { title: "Read Market Updates", hint: "Editorial location hub", to: "/learning-center/local-market-updates" }
        ]);
        return pageShell(
          { crumbs: "Home > Locations", source: "Revised: location overview houses state/city market entry" },
          intro,
          main,
          side
        );
      }

      function ratesPage(ratePage) {
        const rateTypes = ratePage.rateTypes || ["30-year fixed", "15-year fixed", "FHA", "VA", "Jumbo", "Refinance"];
        const stateLinks = first(data.states, 4);
        const news = data.articles
          .filter((article) => article.type === "local_market_update" || article.type === "product_explainer")
          .slice(0, 4);
        const intro = `
          ${block("Rates Hero - Today's mortgage rates", {
            hint: "Bankrate/NerdWallet-style rate comparison page",
            to: "/calculators/mortgage-payment",
            size: "hero tall"
          })}
          ${block("Personalized Rate Quote Form", {
            hint: "Loan purpose, state, credit range, down payment, property type",
            to: "/loan-officers",
            size: "hero"
          })}
        `;
        const main = [
          section(
            "Current Rate Snapshot Cards",
            "National averages and major loan types",
            grid(rateTypes.slice(0, 6).map((type) => block(type, {
              hint: "Rate, APR, points, source date placeholder"
            })), 3)
          ),
          section(
            "Personalized Rate Filters",
            "NerdWallet-style inputs before table",
            grid([

      function directoryPage(directory) {
        const route = directory.route;
        const resultSets = {

          "/loan-options": data.products
        };
        const results = resultSets[route] || data.cities;
        const intro = `
          ${block(`Directory Hero - ${directory.name}`, {
            hint: `Search and filter page for ${directory.filters.join(", ")}`,

      function notFoundPage(path) {
        const intro = `
          ${block("Route Not Found", {
            hint: path,
            to: "/",
            size: "hero tall"
          })}
          ${block("Return to Prototype Home", {
            to: "/",
            size: "hero"
          })}
        `;
        return pageShell(
          { crumbs: `Missing route > ${path}`, source: "Prototype route fallback" },
          intro,
          section("Available Directories", "Use seeded routes", grid(data.directoryPages.map((page) => block(page.name, { to: page.route })), 3)),
          rail([{ title: "Back Home", to: "/" }])
        );
      }

      function render() {
        const app = document.getElementById("app");
        const { path, anchor } = currentRoute();
        const found = maps.routeMap.get(path);
        let html;
        if (!found) {
          html = notFoundPage(path);
        } else if (found.type === "home") {
          html = homePage();
        } else if (found.type === "locationOverview") {
          html = locationOverviewPage();
        } else if (found.type === "rates") {
          html = ratesPage(found.item);
        } else if (found.type === "state") {
          html = statePage(found.item);
        } else if (found.type === "city") {
          html = cityPage(found.item, anchor);
        } else if (found.type === "product") {
          html = productPage(found.item);
        } else if (found.type === "blog") {
          html = blogTopicPage(found.item);
        } else if (found.type === "article") {
          html = articlePage(found.item);
        } else if (found.type === "loanOfficer") {
          html = loanOfficerPage(found.item);
        } else if (found.type === "branch") {
          html = branchPage(found.item);
        } else if (found.type === "calculator") {
          html = calculatorPage(found.item);
        } else if (found.type === "directory") {
          html = directoryPage(found.item);
        }
        app.innerHTML = html;
        if (anchor) {
          requestAnimationFrame(() => {
            const target = document.getElementById(anchor);
            if (target) target.scrollIntoView({ block: "center" });
          });
        } else {
          window.scrollTo({ top: 0, left: 0, behavior: "instant" });
        }
      }

      async function boot() {
        try {
          const response = await fetch(seedUrl);
          data = await response.json();
          maps = buildMaps(data);
          render();
          window.addEventListener("hashchange", render);
        } catch (error) {
          document.getElementById("app").innerHTML = `
            <section class="status">
              <div class="block c5">
                <strong>Could not load mock-data/prototype-seed.json</strong>
                <small>${clean(error.message)}</small>
              </div>
            </section>
          `;
        }
      }

      boot();
    </script>
  </body>
